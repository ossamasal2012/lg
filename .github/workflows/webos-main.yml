name: 🏗️ Build OSSIPTV LG WebOS (CORS & Internet Ready)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-webos:
    name: Build LG TV IPK
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 🛠️ Install webOS TV CLI
        run: npm install -g @webos-tools/cli

      - name: 🗂️ Setup Project Structure
        run: |
          mkdir -p webos-app
          # تأكد من وجود ملف index.html في المستودع (Repository) الخاص بك
          cp index.html webos-app/index.html

          # إنشاء ملف appinfo.json بناءً على بياناتك الجديدة مع إعدادات تخطي القيود
          cat > webos-app/appinfo.json << 'EOF'
          {
              "id": "com.ossiptv.osama.app",
              "version": "1.0.0",
              "vendor": "OSSAMA",
              "type": "web",
              "main": "index.html",
              "title": "OSSIPTV",
              "icon": "icon.png",
              "largeIcon": "largeIcon.png",
              "bgColor": "#000000",
              "iconColor": "#000000",
              "resolution": "1920x1080",
              "supportXHR": true,
              "trustLevel": "default",
              "requiredPermissions": [
                  "internet",
                  "network.state",
                  "audio.output",
                  "video.output"
              ]
          }
          EOF

      - name: 🖼️ Setup App Icon
        run: |
          # تحميل الأيقونة التي حددتها في ملفك
          curl -L "https://i.ibb.co/Mx1d7J1r/Screenshot-2026-04-24-12-02-40-AM.png" -o webos-app/icon.png
          cp webos-app/icon.png webos-app/largeIcon.png

      - name: 📦 Package IPK
        run: |
          # بناء الحزمة النهائية بصيغة .ipk
          ares-package webos-app -o ./output

      - name: 📤 Upload IPK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OSSIPTV-LGTV-Package
          path: output/*.ipk
